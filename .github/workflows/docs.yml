name: Deploy Documentation

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'  
        cache: 'pipenv'         # Cache venv

    - name: Install Pipenv
      run: pip install pipenv

    - name: Install Dependencies
      run: |
        pipenv install --deploy --categories="default docs"

    # NOTE: If you prefer to have the workflow auto-generate fresh .rst files 
    # every time, uncomment the line below and adjust the paths:
    # - name: Auto-generate API Skeleton
    #   run: pipenv run sphinx-apidoc -o docs/source/ ./your_package_folder/ --force

    - name: Build HTML Documentation
      run: |
        cd docs
        pipenv run make html

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./Docs/_build/html
